name: Release

on:
  push:
    branches:
      - 'main'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libfuse2

      - name: Install frontend dependencies
        run: npm install

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Pre-cache WiX (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          echo "Pre-caching WiX toolset..."
          curl -L -o wix314-binaries.zip https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip
          mkdir -p "$HOME/.tauri"
          mv wix314-binaries.zip "$HOME/.tauri/WixTools.zip"
          echo "WiX cached successfully"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: "KeyHeat Map v${{ steps.version.outputs.version }}"
          releaseBody: |
            ## 🔥 KeyHeat Map v${{ steps.version.outputs.version }}

            跨平台键盘/鼠标热力图桌面应用

            ### 📥 下载
            | 平台 | 文件 | 安装方式 |
            |------|------|----------|
            | Windows | `.msi` | 双击安装 |
            | macOS | `.dmg` | 拖拽到 Applications |
            | Ubuntu/Debian | `.deb` | `sudo dpkg -i` |
            | Fedora | `.rpm` | `sudo rpm -i` |

            ### ✨ 功能特性
            - 🎹 实时键盘热力图
            - 🖱️ 鼠标移动/点击追踪
            - 📊 数据分析仪表盘
            - 🖼️ 分享海报生成
            - ⚙️ 系统托盘 + 开机自启
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
